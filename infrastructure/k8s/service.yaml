apiVersion: v1
kind: Service
metadata:
  name: captainchain-backend
spec:
  selector:
    app: captainchain-backend
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: captainchain-frontend
spec:
  selector:
    app: captainchain-frontend
  ports:
    - port: 3000
      targetPort: 3000
  type: LoadBalancer
