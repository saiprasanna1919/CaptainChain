apiVersion: apps/v1
kind: Deployment
metadata:
  name: captainchain-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: captainchain-backend
  template:
    metadata:
      labels:
        app: captainchain-backend
    spec:
      containers:
        - name: backend
          image: captainchain/backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: NEO4J_URI
              valueFrom:
                configMapKeyRef:
                  name: captainchain-config
                  key: NEO4J_URI
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: captainchain-secrets
                  key: neo4j-password
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: captainchain-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: captainchain-frontend
  template:
    metadata:
      labels:
        app: captainchain-frontend
    spec:
      containers:
        - name: frontend
          image: captainchain/frontend:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
